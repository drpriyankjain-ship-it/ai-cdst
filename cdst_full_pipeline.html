<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDST Full System Pipeline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4ef;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a18;
      margin: 0 0 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #73726c;
      margin: 0 0 1.5rem;
    }
    svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text.th { fill: #3C3489; }
    .c-purple text.ts { fill: #534AB7; }

    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text.th { fill: #085041; }
    .c-teal text.ts { fill: #0F6E56; }

    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text.th { fill: #633806; }
    .c-amber text.ts { fill: #854F0B; }

    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text.th { fill: #0C447C; }
    .c-blue text.ts { fill: #185FA5; }

    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text.th { fill: #27500A; }
    .c-green text.ts { fill: #3B6D11; }

    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text.th { fill: #444441; }
    .c-gray text.ts { fill: #5F5E5A; }

    .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red text.th { fill: #791F1F; }
    .c-red text.ts { fill: #A32D2D; }

    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text.th { fill: #712B13; }
    .c-coral text.ts { fill: #993C1D; }

    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; }
      h1 { color: #e8e6e0; }
      .subtitle { color: #888780; }
      .c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
      .c-purple text.th { fill: #CECBF6; }
      .c-purple text.ts { fill: #AFA9EC; }
      .c-teal rect { fill: #085041; stroke: #5DCAA5; }
      .c-teal text.th { fill: #9FE1CB; }
      .c-teal text.ts { fill: #5DCAA5; }
      .c-amber rect { fill: #633806; stroke: #EF9F27; }
      .c-amber text.th { fill: #FAC775; }
      .c-amber text.ts { fill: #EF9F27; }
      .c-blue rect { fill: #0C447C; stroke: #85B7EB; }
      .c-blue text.th { fill: #B5D4F4; }
      .c-blue text.ts { fill: #85B7EB; }
      .c-green rect { fill: #27500A; stroke: #97C459; }
      .c-green text.th { fill: #C0DD97; }
      .c-green text.ts { fill: #97C459; }
      .c-gray rect { fill: #444441; stroke: #B4B2A9; }
      .c-gray text.th { fill: #D3D1C7; }
      .c-gray text.ts { fill: #B4B2A9; }
      .c-red rect { fill: #791F1F; stroke: #F09595; }
      .c-red text.th { fill: #F7C1C1; }
      .c-red text.ts { fill: #F09595; }
      .c-coral rect { fill: #712B13; stroke: #F0997B; }
      .c-coral text.th { fill: #F5C4B3; }
      .c-coral text.ts { fill: #F0997B; }
    }
  </style>
</head>
<body>

<h1>CDST full system pipeline</h1>
<p class="subtitle">Mobile client · Session orchestrator · Three agents · Storage · Doctor auth · Confirmation pipeline · Patient records</p>

<svg width="100%" viewBox="0 0 680 980" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CDST Full System Pipeline</title>
  <desc>Complete CDST architecture showing mobile client, WebSocket orchestrator, three agents, storage layer, doctor authorization, post-session confirmation pipeline, and patient record update flow.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#b4b2a9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Row labels -->
  <text class="ts" x="22" y="58"  text-anchor="middle" style="font-size:9px;fill:#b4b2a9">MOBILE</text>
  <text class="ts" x="22" y="188" text-anchor="middle" style="font-size:9px;fill:#b4b2a9">ORCH.</text>
  <text class="ts" x="22" y="388" text-anchor="middle" style="font-size:9px;fill:#b4b2a9">AGENTS</text>
  <text class="ts" x="22" y="588" text-anchor="middle" style="font-size:9px;fill:#b4b2a9">STORE</text>
  <text class="ts" x="22" y="768" text-anchor="middle" style="font-size:9px;fill:#b4b2a9">POST</text>
  <text class="ts" x="22" y="908" text-anchor="middle" style="font-size:9px;fill:#b4b2a9">RECORDS</text>

  <!-- Dividers -->
  <line x1="44" y1="108" x2="650" y2="108" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="44" y1="268" x2="650" y2="268" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="44" y1="508" x2="650" y2="508" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="44" y1="698" x2="650" y2="698" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="44" y1="848" x2="650" y2="848" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- MOBILE -->
  <g class="c-gray">
    <rect x="200" y="28" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Mobile client (React Native)</text>
    <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">continuous WebSocket · button press → marker event</text>
  </g>

  <!-- ORCHESTRATOR -->
  <g class="c-purple">
    <rect x="120" y="128" width="400" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="320" y="150" text-anchor="middle" dominant-baseline="central">Session orchestrator</text>
    <text class="ts" x="320" y="168" text-anchor="middle" dominant-baseline="central">WebSocket · STT stream · marker routing · Vault init · patient record load</text>
  </g>

  <!-- STT -->
  <g class="c-teal">
    <rect x="536" y="128" width="106" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="589" y="150" text-anchor="middle" dominant-baseline="central">STT</text>
    <text class="ts" x="589" y="168" text-anchor="middle" dominant-baseline="central">Deepgram stream</text>
  </g>

  <!-- Mobile ↔ Orchestrator -->
  <line x1="340" y1="84" x2="340" y2="126" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- Orchestrator → STT -->
  <line x1="520" y1="156" x2="534" y2="156" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- AGENTS -->
  <!-- History agent -->
  <g class="c-teal">
    <rect x="48" y="288" width="176" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="136" y="310" text-anchor="middle" dominant-baseline="central">History agent</text>
    <text class="ts" x="136" y="328" text-anchor="middle" dominant-baseline="central">Call 1: chief complaint</text>
    <text class="ts" x="136" y="344" text-anchor="middle" dominant-baseline="central">Call 2: questionnaire</text>
    <text class="ts" x="136" y="360" text-anchor="middle" dominant-baseline="central">gap-aware · epi prior</text>
    <text class="ts" x="136" y="376" text-anchor="middle" dominant-baseline="central">streams to nurse</text>
  </g>

  <!-- Diagnosis agent -->
  <g class="c-teal">
    <rect x="252" y="288" width="176" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="310" text-anchor="middle" dominant-baseline="central">Diagnosis agent</text>
    <text class="ts" x="340" y="328" text-anchor="middle" dominant-baseline="central">Call 1: concepts</text>
    <text class="ts" x="340" y="344" text-anchor="middle" dominant-baseline="central">Call 2: DDx + epi prior</text>
    <text class="ts" x="340" y="360" text-anchor="middle" dominant-baseline="central">Call 3: gap analysis</text>
    <text class="ts" x="340" y="376" text-anchor="middle" dominant-baseline="central">clarifying questions</text>
  </g>

  <!-- Management agent -->
  <g class="c-teal">
    <rect x="456" y="288" width="176" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="544" y="310" text-anchor="middle" dominant-baseline="central">Management agent</text>
    <text class="ts" x="544" y="328" text-anchor="middle" dominant-baseline="central">Call 1: clarifying findings</text>
    <text class="ts" x="544" y="344" text-anchor="middle" dominant-baseline="central">Call 2: Dx + Rx (RAG)</text>
    <text class="ts" x="544" y="360" text-anchor="middle" dominant-baseline="central">Call 3: risk assessment</text>
    <text class="ts" x="544" y="376" text-anchor="middle" dominant-baseline="central">Call 4: triage + handoff</text>
  </g>

  <!-- Rule engine -->
  <g class="c-red">
    <rect x="456" y="406" width="176" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="544" y="422" text-anchor="middle" dominant-baseline="central">Rule engine</text>
    <text class="ts" x="544" y="440" text-anchor="middle" dominant-baseline="central">deterministic safety gate</text>
  </g>

  <!-- Orchestrator → agents -->
  <line x1="200" y1="184" x2="136" y2="286" stroke="#b4b2a9" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="310" y1="184" x2="310" y2="286" stroke="#b4b2a9" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M430 184 L430 270 L544 270 L544 286" fill="none" stroke="#b4b2a9" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Management → Rule engine -->
  <line x1="544" y1="388" x2="544" y2="404" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- STORAGE -->
  <!-- Vault -->
  <g class="c-amber">
    <rect x="48" y="528" width="188" height="112" rx="8" stroke-width="0.5"/>
    <text class="th" x="142" y="550" text-anchor="middle" dominant-baseline="central">Vault (sessions table)</text>
    <text class="ts" x="142" y="568" text-anchor="middle" dominant-baseline="central">session JSONB document</text>
    <text class="ts" x="142" y="584" text-anchor="middle" dominant-baseline="central">transcript · DDx · Rx</text>
    <text class="ts" x="142" y="600" text-anchor="middle" dominant-baseline="central">risk assessment · triage</text>
    <text class="ts" x="142" y="616" text-anchor="middle" dominant-baseline="central">audio ref · confirm gates</text>
  </g>

  <!-- STG chunks -->
  <g class="c-blue">
    <rect x="256" y="528" width="168" height="112" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="550" text-anchor="middle" dominant-baseline="central">STG chunks (pgvector)</text>
    <text class="ts" x="340" y="568" text-anchor="middle" dominant-baseline="central">NHM treatment protocols</text>
    <text class="ts" x="340" y="584" text-anchor="middle" dominant-baseline="central">dosing · contraindications</text>
    <text class="ts" x="340" y="600" text-anchor="middle" dominant-baseline="central">referral criteria</text>
    <text class="ts" x="340" y="616" text-anchor="middle" dominant-baseline="central">Mgmt agent only</text>
  </g>

  <!-- Media store -->
  <g class="c-gray">
    <rect x="444" y="528" width="188" height="112" rx="8" stroke-width="0.5"/>
    <text class="th" x="538" y="550" text-anchor="middle" dominant-baseline="central">Media store (S3)</text>
    <text class="ts" x="538" y="568" text-anchor="middle" dominant-baseline="central">full session audio (Opus)</text>
    <text class="ts" x="538" y="584" text-anchor="middle" dominant-baseline="central">uploaded post-session</text>
    <text class="ts" x="538" y="600" text-anchor="middle" dominant-baseline="central">async · background</text>
    <text class="ts" x="538" y="616" text-anchor="middle" dominant-baseline="central">90-day retention</text>
  </g>

  <!-- Agents ↔ Vault -->
  <line x1="136" y1="388" x2="136" y2="526" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="340" y1="388" x2="340" y2="526" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <!-- Rule engine → Vault (dashed) -->
  <path d="M544 450 L544 490 L142 490 L142 526" fill="none" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- Management → STG RAG (dashed) -->
  <line x1="456" y1="344" x2="424" y2="344" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M424 344 L424 490 L340 490 L340 526" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- Mobile → Media (post-session upload, dashed) -->
  <path d="M480 84 L640 84 L640 584 L634 584" fill="none" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- POST-SESSION -->
  <!-- Doctor auth -->
  <g class="c-green">
    <rect x="48" y="718" width="200" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="148" y="740" text-anchor="middle" dominant-baseline="central">Doctor auth interface</text>
    <text class="ts" x="148" y="758" text-anchor="middle" dominant-baseline="central">async review queue</text>
    <text class="ts" x="148" y="774" text-anchor="middle" dominant-baseline="central">approve · modify · reject</text>
    <text class="ts" x="148" y="790" text-anchor="middle" dominant-baseline="central">HIGH risk → urgent push</text>
    <text class="ts" x="148" y="806" text-anchor="middle" dominant-baseline="central">audit log append</text>
  </g>

  <!-- Confirmation pipeline -->
  <g class="c-coral">
    <rect x="268" y="718" width="200" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="368" y="740" text-anchor="middle" dominant-baseline="central">Confirmation pipeline</text>
    <text class="ts" x="368" y="758" text-anchor="middle" dominant-baseline="central">gate 1: RDT / test result</text>
    <text class="ts" x="368" y="774" text-anchor="middle" dominant-baseline="central">gate 2: treatment response</text>
    <text class="ts" x="368" y="790" text-anchor="middle" dominant-baseline="central">gate 3: doctor agreed</text>
    <text class="ts" x="368" y="806" text-anchor="middle" dominant-baseline="central">confidence weight → Layer 3</text>
  </g>

  <!-- Formulary service -->
  <g class="c-blue">
    <rect x="488" y="718" width="144" height="100" rx="8" stroke-width="0.5"/>
    <text class="th" x="560" y="740" text-anchor="middle" dominant-baseline="central">Formulary service</text>
    <text class="ts" x="560" y="758" text-anchor="middle" dominant-baseline="central">per-clinic drug stock</text>
    <text class="ts" x="560" y="774" text-anchor="middle" dominant-baseline="central">admin update UI</text>
    <text class="ts" x="560" y="790" text-anchor="middle" dominant-baseline="central">injected into Mgmt</text>
    <text class="ts" x="560" y="806" text-anchor="middle" dominant-baseline="central">agent Call 2 prompt</text>
  </g>

  <!-- Vault → Doctor auth / Confirmation -->
  <line x1="142" y1="640" x2="142" y2="716" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M236 640 L236 680 L368 680 L368 716" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <!-- Formulary → Management agent -->
  <path d="M560 718 L560 460 L634 460 L634 344" fill="none" stroke="#185FA5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- PATIENT RECORDS -->
  <!-- patient_records table -->
  <g class="c-purple">
    <rect x="48" y="868" width="200" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="148" y="892" text-anchor="middle" dominant-baseline="central">patient_records table</text>
    <text class="ts" x="148" y="910" text-anchor="middle" dominant-baseline="central">compact confirmed summary</text>
    <text class="ts" x="148" y="926" text-anchor="middle" dominant-baseline="central">feeds next visit questionnaire</text>
  </g>

  <!-- confirmed_encounters (Layer 3) -->
  <g class="c-purple">
    <rect x="268" y="868" width="200" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="368" y="892" text-anchor="middle" dominant-baseline="central">confirmed_encounters</text>
    <text class="ts" x="368" y="910" text-anchor="middle" dominant-baseline="central">Layer 3 epi prior</text>
    <text class="ts" x="368" y="926" text-anchor="middle" dominant-baseline="central">weighted by confidence</text>
  </g>

  <!-- Epi prior files -->
  <g class="c-gray">
    <rect x="488" y="868" width="144" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="560" y="892" text-anchor="middle" dominant-baseline="central">Epi prior files</text>
    <text class="ts" x="560" y="910" text-anchor="middle" dominant-baseline="central">Layer 1 baseline</text>
    <text class="ts" x="560" y="926" text-anchor="middle" dominant-baseline="central">Layer 2 IDSP JSON</text>
  </g>

  <!-- Doctor auth → patient_records -->
  <line x1="148" y1="818" x2="148" y2="866" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Confirmation → Layer 3 -->
  <line x1="368" y1="818" x2="368" y2="866" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- patient_records → Orchestrator (next visit loop, dashed) -->
  <path d="M148 868 L148 840 L60 840 L60 188 L118 188" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <line x1="48"  y1="962" x2="78"  y2="962" stroke="#b4b2a9" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="84"  y="966" dominant-baseline="central" style="fill:#73726c">data flow</text>
  <line x1="168" y1="962" x2="198" y2="962" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="204" y="966" dominant-baseline="central" style="fill:#73726c">async / cross-layer</text>
  <line x1="330" y1="962" x2="360" y2="962" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text class="ts" x="366" y="966" dominant-baseline="central" style="fill:#73726c">next visit loop</text>

</svg>

</body>
