<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="NurseAI Clinical Assistant - AI-powered clinical decision support">
  <title>NurseAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
  <div id="app">
    <div id="toast-container"></div>

    <main id="pages">
      <section id="page-login" class="page"></section>
      <section id="page-register" class="page"></section>
      <section id="page-dashboard" class="page"></section>
      <section id="page-record" class="page"></section>
      <section id="page-history" class="page"></section>
      <section id="page-about" class="page"></section>
    </main>

    <nav id="tab-bar" class="tab-bar" hidden>
      <button class="tab-item" data-page="dashboard">
        <ion-icon name="home"></ion-icon>
        <span>Dashboard</span>
      </button>
      <button class="tab-item" data-page="record">
        <ion-icon name="mic"></ion-icon>
        <span>Record</span>
      </button>
      <button class="tab-item" data-page="history">
        <ion-icon name="time"></ion-icon>
        <span>History</span>
      </button>
      <button class="tab-item" data-page="about">
        <ion-icon name="help-circle"></ion-icon>
        <span>About</span>
      </button>
    </nav>

    <div id="modal-overlay" class="modal-overlay" hidden></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
